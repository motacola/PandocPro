name: Build & Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: ./gui

      - name: Build GUI
        run: npm run build
        working-directory: ./gui

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pandocpro-${{ matrix.os }}-${{ github.ref_name }}
          path: gui/release/**

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 ${GITHUB_REF}^ || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline HEAD | head -20)
          else
            CHANGELOG=$(git log --oneline ${PREV_TAG}..HEAD)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release Notes
        uses: softprops/action-gh-release@v1
        with:
          files: gui/release/*
          body: |
            ## PandocPro ${{ github.ref_name }}
            
            ### Changes
            ${{ steps.changelog.outputs.CHANGELOG }}
            
            ### Installation
            - **macOS**: Download the `.dmg` or `.zip` file and install
            - **Windows**: Run the installer
            
            ### Auto-Update
            The app will automatically notify you of updates and download them in the background.
